name: 'Build & Deploy Apps'
on:
  push:
    paths:
      - 'mcp/**'
      - 'adapters/**'
      - '.github/workflows/apps-build-deploy.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service:
          - name: mcp-memory
            dockerfile: mcp/memory/Dockerfile
            context: mcp/memory
          - name: mcp-graph
            dockerfile: mcp/graph/Dockerfile
            context: mcp/graph
          - name: mcp-http
            dockerfile: mcp/http/Dockerfile
            context: mcp/http
          - name: mcp-files
            dockerfile: mcp/files/Dockerfile
            context: mcp/files
          - name: adapter-telegram
            dockerfile: adapters/telegram/Dockerfile
            context: adapters/telegram
          - name: adapter-teams
            dockerfile: adapters/teams/Dockerfile
            context: adapters/teams

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Test
        working-directory: ${{ matrix.service.context }}
        run: |
          npm install
          npm run lint 2>/dev/null || true
          npm run test 2>/dev/null || true

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Docker Image
        run: |
          docker build -f ${{ matrix.service.dockerfile }} \
            -t ${{ matrix.service.name }}:${{ github.sha }} \
            -t ${{ matrix.service.name }}:latest \
            .

      - name: Push to ACR
        run: |
          ACR_NAME="${{ secrets.ACR_NAME }}"

          if [ -z "$ACR_NAME" ]; then
            echo "ACR_NAME secret is not set. Add the Azure Container Registry name in GitHub Actions secrets."
            exit 1
          fi

          az acr login --name "$ACR_NAME"
          
          docker tag ${{ matrix.service.name }}:latest \
            ${ACR_NAME}.azurecr.io/${{ matrix.service.name }}:latest
          
          docker push ${ACR_NAME}.azurecr.io/${{ matrix.service.name }}:latest

      - name: Create Summary
        run: |
          ACR_NAME="${{ secrets.ACR_NAME }}"
          echo "## Build Summary ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Service: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${ACR_NAME}.azurecr.io/${{ matrix.service.name }}:latest" >> $GITHUB_STEP_SUMMARY

  deploy-mcp-services:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_NAME: waldunio-agent01
      DEPLOY_ENVIRONMENT: dev
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP || 'rg-waldunio-agent01-mvp' }}
      CONTAINERAPPS_ENV_NAME: ${{ secrets.CONTAINERAPPS_ENV_NAME || 'cae-waldunio-agent01-dev' }}
      COSMOS_DATABASE: malgosha-db
      KV_NAME: ${{ secrets.KV_NAME || 'kv-waldunio-agent01-buw' }}

    strategy:
      matrix:
        service:
          - mcp-memory
          - mcp-graph
          - mcp-http
          - mcp-files
          - adapter-telegram
          - adapter-teams

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Wait for Container Apps Environment to be ready
        run: |
          echo "Waiting for CAE '$CONTAINERAPPS_ENV_NAME' to reach Succeeded state..."
          for i in $(seq 1 30); do
            STATE=$(az containerapp env show \
              --name "$CONTAINERAPPS_ENV_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NotFound")

            echo "  Attempt $i/30 — state: $STATE"

            if [ "$STATE" = "Succeeded" ]; then
              echo "✓ CAE is ready"
              break
            fi

            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
              echo "ERROR: CAE is in $STATE state — cannot deploy"
              exit 1
            fi

            if [ "$i" = "30" ]; then
              echo "ERROR: CAE did not reach Succeeded state after 5 minutes — giving up"
              exit 1
            fi

            sleep 10
          done

      - name: Resolve deployment variables
        run: |
          ACR_NAME="${{ secrets.ACR_NAME }}"
          if [ -z "$ACR_NAME" ]; then
            echo "ACR_NAME secret is not set. Add ACR_NAME in GitHub Actions secrets."
            exit 1
          fi

          COSMOS_ACCOUNT_NAME="${{ secrets.COSMOS_ACCOUNT_NAME }}"
          if [ -z "$COSMOS_ACCOUNT_NAME" ]; then
            COSMOS_ACCOUNT_NAME="cosmos-${PROJECT_NAME}-${DEPLOY_ENVIRONMENT}"
          fi

          COSMOS_ENDPOINT=$(az cosmosdb show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$COSMOS_ACCOUNT_NAME" \
            --query documentEndpoint -o tsv)

          COSMOS_KEY=$(az cosmosdb keys list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$COSMOS_ACCOUNT_NAME" \
            --query primaryMasterKey -o tsv)

          ACR_USERNAME=$(az acr credential show \
            --name "$ACR_NAME" \
            --query username -o tsv)

          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query passwords[0].value -o tsv)

          echo "::add-mask::$COSMOS_KEY"
          echo "::add-mask::$ACR_PASSWORD"

          echo "ACR_NAME=$ACR_NAME"                 >> "$GITHUB_ENV"
          echo "COSMOS_ACCOUNT_NAME=$COSMOS_ACCOUNT_NAME" >> "$GITHUB_ENV"
          echo "COSMOS_ENDPOINT=$COSMOS_ENDPOINT"   >> "$GITHUB_ENV"
          echo "COSMOS_KEY=$COSMOS_KEY"             >> "$GITHUB_ENV"
          echo "ACR_USERNAME=$ACR_USERNAME"         >> "$GITHUB_ENV"
          echo "ACR_PASSWORD=$ACR_PASSWORD"         >> "$GITHUB_ENV"

          # ── Foundry Agent secrets from Key Vault (needed by adapters) ───────
          # Failure is soft — MCP services don't use these vars
          FOUNDRY_ENDPOINT=$(az keyvault secret show \
            --vault-name "$KV_NAME" --name "FOUNDRY-AGENT-ENDPOINT" \
            --query value -o tsv 2>/dev/null || echo "")

          FOUNDRY_KEY=$(az keyvault secret show \
            --vault-name "$KV_NAME" --name "FOUNDRY-AGENT-KEY" \
            --query value -o tsv 2>/dev/null || echo "")

          FOUNDRY_ID=$(az keyvault secret show \
            --vault-name "$KV_NAME" --name "FOUNDRY-AGENT-ID" \
            --query value -o tsv 2>/dev/null || echo "")

          echo "::add-mask::$FOUNDRY_KEY"

          echo "FOUNDRY_ENDPOINT=$FOUNDRY_ENDPOINT" >> "$GITHUB_ENV"
          echo "FOUNDRY_KEY=$FOUNDRY_KEY"           >> "$GITHUB_ENV"
          echo "FOUNDRY_ID=$FOUNDRY_ID"             >> "$GITHUB_ENV"

          WHISPER_DEPLOYMENT=$(az keyvault secret show \
            --vault-name "$KV_NAME" --name "FOUNDRY-WHISPER-DEPLOYMENT" \
            --query value -o tsv 2>/dev/null || echo "waldunio-whisper")

          echo "WHISPER_DEPLOYMENT=$WHISPER_DEPLOYMENT" >> "$GITHUB_ENV"

          # ── MCP service FQDNs (used by adapters for internal calls) ─────────
          # These Container Apps are already deployed — fetch their external FQDNs
          for svc in mcp-memory mcp-graph mcp-http mcp-files; do
            FQDN=$(az containerapp show \
              --name "$svc" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")
            VAR_NAME=$(echo "$svc" | tr '[:lower:]-' '[:upper:]_')_URL
            echo "${VAR_NAME}=https://${FQDN}" >> "$GITHUB_ENV"
          done

      - name: Deploy to Azure Container Apps
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${{ matrix.service }}:latest"
          COMMON_ARGS="--name ${{ matrix.service }} --resource-group $AZURE_RESOURCE_GROUP --environment $CONTAINERAPPS_ENV_NAME --image $IMAGE --target-port 3000 --ingress external --registry-server ${ACR_NAME}.azurecr.io --registry-username $ACR_USERNAME --registry-password $ACR_PASSWORD"

          case "${{ matrix.service }}" in
            mcp-memory)
              az containerapp up $COMMON_ARGS \
                --env-vars \
                  NODE_ENV=production \
                  LOG_LEVEL=info \
                  MCP_MEMORY_PORT=3000 \
                  AZURE_COSMOS_ENDPOINT="$COSMOS_ENDPOINT" \
                  AZURE_COSMOS_KEY="$COSMOS_KEY" \
                  COSMOS_DATABASE="$COSMOS_DATABASE"
              ;;
            mcp-graph)
              az containerapp up $COMMON_ARGS \
                --env-vars \
                  NODE_ENV=production \
                  LOG_LEVEL=info \
                  MCP_GRAPH_PORT=3000 \
                  AZURE_COSMOS_ENDPOINT="$COSMOS_ENDPOINT" \
                  AZURE_COSMOS_KEY="$COSMOS_KEY" \
                  COSMOS_DATABASE="$COSMOS_DATABASE"
              ;;
            mcp-http)
              az containerapp up $COMMON_ARGS \
                --env-vars \
                  NODE_ENV=production \
                  LOG_LEVEL=info \
                  MCP_HTTP_PORT=3000 \
                  HTTP_ALLOWLIST_URLS='https://api.example.com|https://graph.microsoft.com'
              ;;
            mcp-files)
              az containerapp up $COMMON_ARGS \
                --env-vars \
                  NODE_ENV=production \
                  LOG_LEVEL=info \
                  MCP_FILES_PORT=3000 \
                  MCP_FILES_BASE_PATH=/data/agent
              ;;

            # ── Channel adapters ─────────────────────────────────────────────
            adapter-telegram)
              TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
              if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
                echo "⚠️  TELEGRAM_BOT_TOKEN secret not set — adapter will fail to start"
                echo "    Add it via GitHub → Settings → Secrets → Actions"
                exit 1
              fi

              # Deploy with a placeholder PUBLIC_BASE_URL; updated below once FQDN is known
              az containerapp up $COMMON_ARGS \
                --env-vars \
                  NODE_ENV=production \
                  LOG_LEVEL=info \
                  TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
                  FOUNDRY_AGENT_ENDPOINT="$FOUNDRY_ENDPOINT" \
                  FOUNDRY_AGENT_KEY="$FOUNDRY_KEY" \
                  FOUNDRY_AGENT_ID="$FOUNDRY_ID" \
                  WHISPER_DEPLOYMENT_NAME="$WHISPER_DEPLOYMENT" \
                  MCP_MEMORY_URL="$MCP_MEMORY_URL" \
                  MCP_GRAPH_URL="$MCP_GRAPH_URL" \
                  MCP_HTTP_URL="$MCP_HTTP_URL" \
                  MCP_FILES_URL="$MCP_FILES_URL" \
                  PUBLIC_BASE_URL="https://placeholder"

              # Now update PUBLIC_BASE_URL with the real FQDN and trigger restart
              ADAPTER_FQDN=$(az containerapp show \
                --name adapter-telegram \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --query "properties.configuration.ingress.fqdn" -o tsv)

              az containerapp update \
                --name adapter-telegram \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --set-env-vars "PUBLIC_BASE_URL=https://${ADAPTER_FQDN}"

              echo "✓ Telegram adapter deployed: https://${ADAPTER_FQDN}"
              echo "  Webhook will be registered at: https://${ADAPTER_FQDN}/webhook/telegram"
              ;;

            adapter-teams)
              TEAMS_APP_ID="${{ secrets.TEAMS_BOT_APP_ID }}"
              TEAMS_APP_PASSWORD="${{ secrets.TEAMS_BOT_APP_PASSWORD }}"
              if [ -z "$TEAMS_APP_ID" ] || [ -z "$TEAMS_APP_PASSWORD" ]; then
                echo "⚠️  TEAMS_BOT_APP_ID / TEAMS_BOT_APP_PASSWORD secrets not set"
                echo "    Register a Bot in Azure Portal first (see docs/DEPLOYMENT.md)"
                echo "    Deploying without Teams credentials — bot will NOT authenticate"
              fi

              az containerapp up $COMMON_ARGS \
                --env-vars \
                  NODE_ENV=production \
                  LOG_LEVEL=info \
                  TEAMS_BOT_APP_ID="$TEAMS_APP_ID" \
                  TEAMS_BOT_APP_PASSWORD="$TEAMS_APP_PASSWORD" \
                  FOUNDRY_AGENT_ENDPOINT="$FOUNDRY_ENDPOINT" \
                  FOUNDRY_AGENT_KEY="$FOUNDRY_KEY" \
                  FOUNDRY_AGENT_ID="$FOUNDRY_ID" \
                  MCP_MEMORY_URL="$MCP_MEMORY_URL" \
                  MCP_GRAPH_URL="$MCP_GRAPH_URL" \
                  MCP_HTTP_URL="$MCP_HTTP_URL" \
                  MCP_FILES_URL="$MCP_FILES_URL"

              ADAPTER_FQDN=$(az containerapp show \
                --name adapter-teams \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --query "properties.configuration.ingress.fqdn" -o tsv)

              echo "✓ Teams adapter deployed: https://${ADAPTER_FQDN}"
              echo "  Bot Framework messaging endpoint: https://${ADAPTER_FQDN}/api/messages"
              ;;

            *)
              echo "Unknown service: ${{ matrix.service }}"
              exit 1
              ;;
          esac

      - name: Create Deployment Summary
        run: |
          FQDN=$(az containerapp show \
            --name "${{ matrix.service }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "## Deploy Summary ✅ — ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${ACR_NAME}.azurecr.io/${{ matrix.service }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://$FQDN" >> $GITHUB_STEP_SUMMARY
